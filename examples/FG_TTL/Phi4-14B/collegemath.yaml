### model
model_name_or_path: /path/to/Phi4-14B
### method
stage: sft
do_train: true
do_predict: true
finetuning_type: lora
# lora_target: q_proj,v_proj
lora_target: qkv_proj

# full_determinism: true

trust_remote_code: true
setting: FG_TTL
entropy_type: temperature_scaled_entropy   

### dataset
dataset: &dataset college_math_formatted 
eval_dataset: *dataset

template: phi4
cutoff_len: 1024
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16


top_p_2: 0.2
entropy_threshold: 1.0e-4
gain_softmax_temp: 1.2
temperature_alpha: 0.5

### output
output_dir: saves/Phi4-14B/college_math

learning_rate: 1.5e-5

logging_steps: 10
save_strategy: "no"
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1


num_train_epochs: 1.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000


### eval
do_eval: null

### predict
temperature: 0.0
do_sample: false
max_new_tokens: 8192  
per_device_eval_batch_size: 1
predict_with_generate: true

report_to: none