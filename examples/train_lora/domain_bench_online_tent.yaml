### method
stage: sft
do_train: true
do_predict: true
finetuning_type: lora
lora_target: q_proj,v_proj
# lora_target: qkv_proj
# seed: 44
# full_determinism: true  # 确保完全可复现

trust_remote_code: true
setting: online_tent  # online_tent, use_forking_tokens, online_adaptive_k, online_eata, online_ttl
# only_last_token: true   # 使用第new_token进行更新
entropy_type: naive_entropy     # dirichlet_entropy (from COME paper), naive_entropy (from Tent paper)
new_tokens: -1
## 
initial_delta: 0.02
threshold_low: 0.02
patient_m: 2
kl_loss_coef: 0.0 # 0.1   # kl loss 一般很小，所以这里的系数设的稍微大了些

# online eata / online ttl 都需要一个阈值
threshold: 0.4

# entropy_type: SAFE_Entropy_loss_detach_v2  # adaptive_entropy, entropy_detach, collapse_reg_entropy, collapse_reg_entropy_v2, SAFE_Entropy_loss, SAFE_Entropy_loss_v2, SAFE_Entropy_loss_detach, SAFE_Entropy_loss_detach_v2

### dataset
dataset: &dataset geosignal_5k # geosignal_5k, agriculture_5k, gen_med_gpt_5k, wealth_5k
eval_dataset: *dataset
# template: llama2
# template: qwen
template: llama3
# template: qwen3
# template: phi4
cutoff_len: 4096
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16

### output

output_dir: saves/output2/Llama-3.1-8B/domain/online_tent/geosignal_5k/1.0e-6
learning_rate: 1.0e-6

logging_steps: 10
# save_steps: 4000
save_strategy: "no"

plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1

num_train_epochs: 1.0
# num_train_epochs: 2.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000


### eval
do_eval: null

### predict
temperature: 0.0
do_sample: false
max_new_tokens: 512
per_device_eval_batch_size: 1
predict_with_generate: true

# report_to: tensorboard
# logging_dir: tensorboard/runs-0327
report_to: none