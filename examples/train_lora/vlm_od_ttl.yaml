
### model
model_name_or_path: /hujinwu/LLM_Assemble/pretrain_model/models--Qwen--Qwen2.5-VL-3B-Instruct
model_name_or_path: /hujinwu/LLM_Assemble/pretrain_model/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/1b989f2c63999d7344135894d3cfa8f494116743
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true


### method
stage: sft
do_train: true
do_predict: true
finetuning_type: lora
lora_target: q_proj,v_proj
# lora_target: qkv_proj

# seed: 31415926
# full_determinism: true  # 确保完全可复现

trust_remote_code: true
setting: online_adaptive_k  # online_tent, use_forking_tokens, online_adaptive_k, online_eata, online_ttl
# only_last_token: true   # 使用第new_token进行更新
# entropy_type: dirichlet_entropy     # dirichlet_entropy (from COME paper), naive_entropy (from Tent paper)
new_tokens: 32
## 
initial_delta: 0.02
threshold_low: 0.02
patient_m: 2
prevh_coef: 0.3  # 用于计算 d_i < prev_h * self.prevh_coef
kl_loss_coef: 0.0 # 0.1   # kl loss 一般很小，所以这里的系数设的稍微大了些

# online eata / online ttl 都需要一个阈值
threshold: 0.4

entropy_type: SAFE_Entropy_loss_detach_v2  # adaptive_entropy, entropy_detach, collapse_reg_entropy, collapse_reg_entropy_v2, SAFE_Entropy_loss, SAFE_Entropy_loss_v2, SAFE_Entropy_loss_detach, SAFE_Entropy_loss_detach_v2

### dataset
dataset: &dataset math_vision  # gsm8k_test_formatted, gsm8k_test_add_suffix, math_500, college_math_formatted, aime24_formatted, aime25_formatted, minerva_formatted, olympiad_formatted
eval_dataset: *dataset
# template: llama2
template: qwen2_vl
cutoff_len: 2048
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16

### output

