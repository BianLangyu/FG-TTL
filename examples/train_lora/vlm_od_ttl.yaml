output_dir: saves/AAAI26/Qwen2.5-VL-3B-Instruct/online_adaptive_k/relative_entropy_as_thres-without_abs/math_vision/SAFE_Entropy_loss_detach_v2/lam_0.5-lr_5e-6-new_tokens_32-N0_8-K_max_24-K_min_2-initial_delta_0.02-patient_m_2-threshold_low_0.02-coef_0.3-seed_42



logging_steps: 10
# save_steps: 4000
save_strategy: "no"
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1

# learning_rate: 5.0e-5
# learning_rate: 2.5e-5
# learning_rate: 1.0e-5
# learning_rate: 1.25e-5
# learning_rate: 1.5e-5
# learning_rate: 1.75e-5
# learning_rate: 2.0e-5
# learning_rate: 2.25e-5
# learning_rate: 2.75e-5
# learning_rate: 3.0e-5

# learning_rate: 1.0e-6
# learning_rate: 2.5e-6
learning_rate: 5.0e-6
# learning_rate: 7.5e-6

# learning_rate: 1.0e-7
# learning_rate: 2.5e-7
# learning_rate: 5.0e-7
# learning_rate: 7.5e-7


num_train_epochs: 1.0
# num_train_epochs: 2.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000


### eval
do_eval: null

### predict
temperature: 0.0
do_sample: false
max_new_tokens: 8192  # 之前是1024，现在统一设成8192
per_device_eval_batch_size: 1
predict_with_generate: true

# report_to: tensorboard
# logging_dir: tensorboard/runs-0327
report_to: none