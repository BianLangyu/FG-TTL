### method
stage: sft
do_train: true
do_predict: true
finetuning_type: lora
lora_target: q_proj,v_proj
# lora_target: qkv_proj
# seed: 44
# full_determinism: true  # 确保完全可复现

trust_remote_code: true
setting: online_ttl_sw_shape
# online_tent, use_forking_tokens, online_adaptive_k, online_eata, online_ttl,dynamic_truncation_penalty
# only_last_token: true   # 使用第new_token进行更新
entropy_type: naive_entropy     # dirichlet_entropy (from COME paper), naive_entropy (from Tent paper)
new_tokens: -1
## 
initial_delta: 0.02
threshold_low: 0.02
patient_m: 2
kl_loss_coef: 0.0 # 0.1   # kl loss 一般很小，所以这里的系数设的稍微大了些

# entropy_type: SAFE_Entropy_loss_detach_v2  # adaptive_entropy, entropy_detach, collapse_reg_entropy, collapse_reg_entropy_v2, SAFE_Entropy_loss, SAFE_Entropy_loss_v2, SAFE_Entropy_loss_detach, SAFE_Entropy_loss_detach_v2

### dataset
dataset: &dataset agriculture_5k 
# geosignal_5k, agriculture_5k, gen_med_gpt_5k, wealth_5k, alpaca_gpt4_5k, instruction_wild_5k, dolly_5k
eval_dataset: *dataset
# template: llama2
# template: qwen
template: llama3
# template: qwen3
# template: phi4
cutoff_len: 4096
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16

lower_std_mult: 1.0        # 下界等于 均值 - 1.0*标准差 (越小丢弃越简单的)
upper_std_mult: 3.0          # 上界等于 均值 + 2.0*标准差 (越小丢弃越多的异常高噪)
max_ce_diff: 3.0             # 防止指数爆炸，最大差值锁定，建议填 5.0 (放大约148倍)

# 专属 online_ttl_ema 参数
ema_alpha: 0.9               # EMA 衰减平滑系数，越接近1越不敏感
# 专属 online_ttl_sw 参数
history_window_size: 128   
# online eata / online ttl 都需要一个阈值
threshold: 3

# shape-based 过滤参数
shape_cv_threshold: 1.5
shape_max_ratio: 8.0
shape_alpha: 0.2
shape_hard_filter: false
shape_min_weight: 0.05


output_dir: saves/output3/Llama-3.1-8B/domain/online_ttl_sw_shape/soft/shape_alpha_0.2/agriculture_5k/5.0e-6

learning_rate: 5.0e-6

logging_steps: 10
# save_steps: 4000
save_strategy: "no"

plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1

num_train_epochs: 1.0
# num_train_epochs: 2.0
lr_scheduler_type: constant
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000


### eval
do_eval: null

### predict
temperature: 0.0
do_sample: false
max_new_tokens: 512
per_device_eval_batch_size: 1
predict_with_generate: true

# report_to: tensorboard
# logging_dir: tensorboard/runs-0327
report_to: none