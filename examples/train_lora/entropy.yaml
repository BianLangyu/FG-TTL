# The batch generation can be SLOW using this config.
# For faster inference, we recommend to use `scripts/vllm_infer.py`.

### model
model_name_or_path: /hujinwu/LLM_Assemble/pretrain_model/Llama-3.1-8B-Instruct
# model_name_or_path: /hujinwu/LLM_Assemble/pretrain_model/Qwen2.5-7B-Instruct
# model_name_or_path: /hujinwu/LLM_Assemble/pretrain_model/DeepSeek-R1-Distill-Qwen-7B
# adapter_name_or_path: saves/llama3-8b/lora/sft
trust_remote_code: true

# full_determinism: true

### method
stage: sft
do_predict: true
do_train: true
finetuning_type: lora

### dataset
dataset: gsm8k_test_clean_with_predict
eval_dataset: gsm8k_test_clean_with_predict # gsm8k_test_formatted, math_500, mawps_formatted, college_math_formatted, aime24_formatted, aime25_formatted  / gsm8k_test_add_suffix, minerva_formatted
# template: qwen
template: llama3
cutoff_len: 9216
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
# output_dir: saves/AAAI26/DeepSeek-R1-Distill-Qwen-7B/base_model_results-hf-/aime25_formatted
output_dir: saves/AAAI26/Llama-3.1-8B-Instruct/base_model_results-hf/gsm8k_test_clean_with_predict
# output_dir: saves/AAAI26/Qwen2.5-7B-Instruct/base_model_results-hf/college_math_formatted
overwrite_output_dir: true
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000


temperature: 0.0
do_sample: false
max_new_tokens: 8192  # 之前是1024，现在统一设成8192