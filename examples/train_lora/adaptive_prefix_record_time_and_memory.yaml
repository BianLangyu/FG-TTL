### method
stage: sft
do_train: true
do_predict: true
finetuning_type: lora
lora_target: q_proj,v_proj
# lora_target: qkv_proj

# seed: 31415926
# full_determinism: true  # 确保完全可复现

trust_remote_code: true
setting: online_adaptive_k  # online_tent, use_forking_tokens, online_adaptive_k, online_eata, online_ttl
# only_last_token: true   # 使用第new_token进行更新
# entropy_type: dirichlet_entropy     # dirichlet_entropy (from COME paper), naive_entropy (from Tent paper)
new_tokens: 32
## 
initial_delta: 0.02
threshold_low: 0.02
patient_m: 2
prevh_coef: 0.3  # 用于计算 d_i < prev_h * self.prevh_coef
kl_loss_coef: 0.0 # 0.1   # kl loss 一般很小，所以这里的系数设的稍微大了些

# online eata / online ttl 都需要一个阈值
threshold: 0.4

entropy_type: SAFE_Entropy_loss_detach_v2  # adaptive_entropy, entropy_detach, collapse_reg_entropy, collapse_reg_entropy_v2, SAFE_Entropy_loss, SAFE_Entropy_loss_v2, SAFE_Entropy_loss_detach, SAFE_Entropy_loss_detach_v2

### dataset
dataset: &dataset college_math_formatted  # gsm8k_test_formatted, gsm8k_test_add_suffix, math_500, mawps_formatted, college_math_formatted, aime24_formatted, aime25_formatted, minerva_formatted, olympiad_formatted
eval_dataset: *dataset
# template: llama2
# template: qwen
template: llama3
# template: qwen3
# template: phi4
cutoff_len: 1024
max_samples: 41000
overwrite_cache: true
preprocessing_num_workers: 16

